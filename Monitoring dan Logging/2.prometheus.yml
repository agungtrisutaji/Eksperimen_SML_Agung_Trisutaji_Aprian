global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: telco-churn-fastapi-local
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8000

  - job_name: telco-churn-fastapi-from-docker
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000

  - job_name: telco-churn-exporter-local
    static_configs:
      - targets:
          - 127.0.0.1:8001

